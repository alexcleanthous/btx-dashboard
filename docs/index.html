    <script>
      // GitHub Pages forces a 10-min HTTP cache we cannot override with response headers, so bust it
      // client-side: on load, stamp the URL with a per-minute "v" param (the browser cache is keyed by
      // the full URL, so a fresh value forces a real network fetch), then auto-refresh every 10 min so a
      // left-open tab never goes stale. StatiCrypt re-decrypts from its URL token automatically, so this
      // never re-prompts for the password.
      (function () {
        try {
          var url = new URL(window.location.href);
          var bucket = Math.floor(Date.now() / 60000);
          if (url.searchParams.get('v') !== String(bucket)) {
            url.searchParams.set('v', String(bucket));
            window.location.replace(url.toString());
            return;
          }
          setTimeout(function () { window.location.reload(); }, 600000);
        } catch (e) {}
      })();

      .staticrypt-toggle-password-visibility:hover { opacity: 0.7; }
      .staticrypt-decrypt-button { width: 100%; background: var(--red); color: #ffffff; font-family: var(--font); font-size: 14px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; border: none; border-radius: 40px; padding: 15px 24px; cursor: pointer; transition: background 0.15s; -webkit-appearance: none; }
      .staticrypt-decrypt-button:hover { background: var(--red-hover); }
