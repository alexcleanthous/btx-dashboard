      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --black: #070808; --red: #f54949; --red-hover: #070808;
        --bg: #fbf8f5; --text: #070808; --text-muted: #6d6e71;
        --border: #e0dedc; --grey-light: #f4f4f4;
        --font: "DM Sans", sans-serif;
      }
      html, body { height: 100%; }
      body { background-color: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }
      .staticrypt-spinner-container { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 10; }
      .staticrypt-spinner { width: 2rem; height: 2rem; border: 3px solid var(--border); border-right-color: var(--red); border-radius: 50%; animation: spin 0.75s linear infinite; }
      @keyframes spin { 100% { transform: rotate(360deg); } }
      .staticrypt-content { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 40px 24px; gap: 40px; }
      .logo { display: flex; flex-direction: column; align-items: center; gap: 10px; user-select: none; }
      .logo-svg { height: 28px; width: auto; display: block; }
      .logo-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); }
      .card { width: 100%; max-width: 420px; background: #ffffff; border: 1px solid var(--border); border-radius: 4px; padding: 40px; display: flex; flex-direction: column; gap: 28px; }
      .card-header { text-align: center; display: flex; flex-direction: column; gap: 8px; }
      .card-label { font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--red); }
      .card-subtitle { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
      #staticrypt-form { display: flex; flex-direction: column; gap: 16px; }
      .staticrypt-password-container { position: relative; }
      #staticrypt-password { width: 100%; background: var(--grey-light); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: var(--font); font-size: 15px; padding: 13px 44px 13px 16px; outline: none; transition: border-color 0.15s; -webkit-appearance: none; }
      #staticrypt-password::placeholder { color: var(--text-muted); opacity: 0.7; }
      #staticrypt-password:focus { border-color: var(--black); background: #ffffff; }
      .staticrypt-toggle-password-visibility { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; opacity: 0.35; cursor: pointer; transition: opacity 0.15s; filter: invert(1); }
      .staticrypt-toggle-password-visibility:hover { opacity: 0.7; }
      .staticrypt-decrypt-button { width: 100%; background: var(--red); color: #ffffff; font-family: var(--font); font-size: 14px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; border: none; border-radius: 40px; padding: 15px 24px; cursor: pointer; transition: background 0.15s; -webkit-appearance: none; }
      .staticrypt-decrypt-button:hover { background: var(--red-hover); }
      .staticrypt-decrypt-button:active { transform: scale(0.99); }
      label.staticrypt-remember { display: flex; align-items: center; gap: 10px; cursor: pointer; }
      .staticrypt-remember input[type="checkbox"] { appearance: none; -webkit-appearance: none; width: 14px; height: 14px; border: 1.5px solid var(--border); border-radius: 2px; background: transparent; cursor: pointer; position: relative; flex-shrink: 0; transition: border-color 0.15s, background 0.15s; }
      .staticrypt-remember input[type="checkbox"]:checked { background: var(--red); border-color: var(--red); }
      .staticrypt-remember input[type="checkbox"]:checked::after { content: ""; position: absolute; top: 1px; left: 4px; width: 4px; height: 7px; border: 2px solid #fff; border-top: none; border-left: none; transform: rotate(45deg); }
      .remember-label { font-size: 12px; color: var(--text-muted); letter-spacing: 0.03em; }
      .footer { font-size: 11px; color: var(--text-muted); opacity: 0.6; letter-spacing: 0.08em; text-transform: uppercase; }
      .hidden { display: none !important; }
